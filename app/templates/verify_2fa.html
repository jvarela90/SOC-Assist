<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SOC Assist — Verificación 2FA</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background: #0d1117; }
    .auth-card { max-width: 400px; }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">
  <div class="auth-card w-100 px-3">
    <div class="text-center mb-4">
      <i class="bi bi-shield-lock-fill fs-1 text-warning"></i>
      <h4 class="mt-2 mb-0">Verificación en dos pasos</h4>
      <p class="text-muted small mt-1">Ingresa el código de tu aplicación autenticadora</p>
    </div>

    {% if error %}
    <div class="alert alert-danger py-2 small"><i class="bi bi-exclamation-triangle me-1"></i>{{ error }}</div>
    {% endif %}

    <div class="card border-secondary">
      <div class="card-body">
        <form method="post" action="/verify-2fa" autocomplete="off">
          <div class="mb-3">
            <label class="form-label">Código TOTP</label>
            <input type="text" name="totp_code" class="form-control form-control-lg text-center bg-dark text-light border-secondary"
                   placeholder="000 000" maxlength="6" pattern="[0-9]{6}"
                   autofocus inputmode="numeric" autocomplete="one-time-code">
            <div class="form-text text-muted">Código de 6 dígitos — válido por 30 segundos.</div>
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-warning">
              <i class="bi bi-shield-check me-1"></i>Verificar
            </button>
          </div>
        </form>
      </div>
    </div>

    <div class="text-center mt-3">
      <a href="/login" class="text-muted text-decoration-none small">
        <i class="bi bi-arrow-left me-1"></i>Volver al inicio de sesión
      </a>
    </div>
  </div>

  <script>
    // Auto-format TOTP input: add space after 3 digits
    const inp = document.querySelector('input[name="totp_code"]');
    if (inp) {
      inp.addEventListener('input', () => {
        let v = inp.value.replace(/\D/g, '').slice(0, 6);
        inp.value = v;
      });
    }
  </script>
</body>
</html>
